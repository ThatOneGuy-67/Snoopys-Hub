<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxies</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #9aa4b2;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(rgba(50,50,50,0.8), rgba(50,50,50,0.8)),
                  url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .neon-title {
      font-size: 42px;
      letter-spacing: 4px;
      margin-bottom: 8px;
      color: #f0f0f0;
      text-shadow: 0 0 16px rgba(255,255,255,0.12);
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #a8a8a8;
      margin-bottom: 32px;
    }

    .links-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
    }

    .proxy-link {
      background: rgba(18, 18, 18, 0.26);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 22px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 8rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #f2f2f2;
    }

    .proxy-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .proxy-link:active {
      transform: scale(0.95);
      transition: transform 0.1s ease-out;
    }

    .proxy-link-title {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .proxy-link-desc {
      font-size: 0.875rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1 class="neon-title">LINKS</h1>
  <div class="subtitle">// idk</div>

  <div class="links-container" id="links-container"></div>

  <script>
    const links = [
      {title:"Snoopy's Hub", desc:"The Best Site", url:"https://sites.google.com/view/snoopyshub"},
      {title:"GN-Math", desc:"Lots of Games", url:"https://script.google.com/a/macros/halifax.k12.va.us/s/AKfycbxQvbCW4DXTvZxQnB6f8h1IkWR_l2Yos4ww0196J9st06UOZyl8sAEGweDDW8IVtoaG/exec"},
      {title:"Fern", desc:"Hate the ads", url:"http://s3.amazonaws.com/fernisbest/index.html"},
      {title:"Sandstone", desc:"Sometimes works", url:"https://thatoneguy-67.github.io/SandStone/"},
{title:"Flix", desc:"Movie site", url:"https://flixifytvisbackformoregithub.github.io/ninjastelthy/"},
      // Add the rest here...
    ];

    const container = document.getElementById('links-container');
    links.forEach(link => {
      const a = document.createElement('a');
      a.className = 'proxy-link';
      a.href = link.url;
      a.target = "_blank"; // opens in new tab
      a.rel = "noopener noreferrer"; // security best practice
      a.innerHTML = `<div class="proxy-link-title">${link.title}</div>
                     <div class="proxy-link-desc">${link.desc}</div>`;
      container.appendChild(a);
    });
  </script>
</body>
</html>
