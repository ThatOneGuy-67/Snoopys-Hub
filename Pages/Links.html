<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Apply theme BEFORE page renders
    (function() {
      const theme = localStorage.getItem('siteTheme') || 'dark';
      if (theme === 'light') document.documentElement.classList.add('theme-light');
      if (theme === 'neon') document.documentElement.classList.add('theme-neon');
      if (theme === 'spring') document.documentElement.classList.add('theme-spring');
      if (theme === 'summer') document.documentElement.classList.add('theme-summer');
      if (theme === 'autumn') document.documentElement.classList.add('theme-autumn');
      if (theme === 'winter') document.documentElement.classList.add('theme-winter');
    })();
  </script>
  <script src="../notification-helper.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #9aa4b2;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(rgba(50,50,50,0.8), rgba(50,50,50,0.8)),
                  url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .neon-title {
      font-size: 42px;
      letter-spacing: 4px;
      margin-bottom: 8px;
      color: #f0f0f0;
      text-shadow: 0 0 16px rgba(255,255,255,0.12);
      text-align: center;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #a8a8a8;
      margin-bottom: 32px;
    }

    .links-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
    }

    .proxy-link {
      background: rgba(18, 18, 18, 0.26);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 22px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 8rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #f2f2f2;
    }

    .proxy-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .proxy-link:active {
      transform: scale(0.95);
      transition: transform 0.1s ease-out;
    }

    .proxy-link-title {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .proxy-link-desc {
      font-size: 0.875rem;
      opacity: 0.7;
    }

    /* Theme Variants */
    .theme-light {
      --accent: #007acc;
    }

    .theme-light body {
      background: linear-gradient(rgba(240,240,240,0.9), rgba(240,240,240,0.9)),
                  url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif");
      color: #333;
    }

    .theme-light .neon-title,
    .theme-light .version {
      color: #333;
      text-shadow: none;
    }

    .theme-light .subtitle,
    .theme-light .date {
      color: #666;
    }

    .theme-light .proxy-link {
      background: rgba(255,255,255,0.9);
      color: #333;
    }

    .theme-light .proxy-link:hover {
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .theme-neon {
      --accent: #ff00ff;
    }

    .theme-neon body {
      background: linear-gradient(rgba(20,20,50,0.8), rgba(20,20,50,0.8)),
                  url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif");
    }

    .theme-neon .neon-title,
    .theme-neon .version {
      text-shadow: 0 0 16px #ff00ff;
    }

    .theme-neon .proxy-link {
      background: rgba(30,10,50,0.8);
      border: 1px solid rgba(255,0,255,0.2);
    }

    .theme-neon .proxy-link:hover {
      box-shadow: 0 0 20px rgba(255,0,255,0.3);
      border-color: rgba(255,0,255,0.4);
    }

    .theme-spring {
      --accent: #f1af9b;
    }

    .theme-spring body {
      background: linear-gradient(rgba(254, 196, 185, 0.288), rgba(254, 196, 185, 0.288)),
                  radial-gradient(circle at top left, rgba(124, 209, 133, 0.35), transparent 35%),
                  linear-gradient(180deg, #000000 0%, #000000 100%);
      color: #1c1d1c;
    }

    .theme-spring .neon-title,
    .theme-spring .version {
      color: #000;
    }

    .theme-spring .subtitle,
    .theme-spring .date {
      color: #333;
    }

    .theme-spring .proxy-link {
      background: rgba(233, 180, 155, 0.7);
      color: #000;
    }

    .theme-spring .proxy-link:hover {
      background: rgba(233, 180, 155, 0.85);
      box-shadow: 0 0 15px rgba(124, 209, 133, 0.2);
    }

    .theme-summer {
      --accent: #f9a825;
    }

    .theme-summer body {
      background: linear-gradient(rgba(255,246,220,0.88), rgba(255,246,220,0.88)),
                  radial-gradient(circle at top right, rgba(255,235,156,0.45), transparent 30%),
                  linear-gradient(180deg, #ffe6a8 0%, #f8f1d1 100%);
      color: #3b2b0d;
    }

    .theme-summer .neon-title,
    .theme-summer .version {
      color: #5a3e1a;
    }

    .theme-summer .subtitle,
    .theme-summer .date {
      color: #6b4e1a;
    }

    .theme-summer .proxy-link {
      background: rgba(255, 238, 174, 0.8);
      color: #3b2b0d;
    }

    .theme-summer .proxy-link:hover {
      background: rgba(255, 238, 174, 0.95);
      box-shadow: 0 0 15px rgba(249, 168, 37, 0.2);
    }

    .theme-autumn {
      --accent: #ff8c00;
    }

    .theme-autumn body {
      background: linear-gradient(rgba(139, 35, 0, 0.7), rgba(139, 35, 0, 0.7)),
                  linear-gradient(135deg, #cc5500 0%, #8b2300 100%);
      color: #fff8f3;
    }

    .theme-autumn .neon-title,
    .theme-autumn .version {
      color: #ffe6cc;
    }

    .theme-autumn .subtitle,
    .theme-autumn .date {
      color: #ffd9b3;
    }

    .theme-autumn .proxy-link {
      background: rgba(204, 85, 0, 0.7);
      color: #fff8f3;
    }

    .theme-autumn .proxy-link:hover {
      background: rgba(204, 85, 0, 0.85);
      box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
    }

    .theme-winter {
      --accent: #4da3ff;
    }

    .theme-winter body {
      background: linear-gradient(rgba(50,50,50,0.8), rgba(50,50,50,0.8)),
                  url("https://i.pinimg.com/originals/11/cf/ee/11cfeef9eaa56c71a6eeb9933f933492.gif");
      color: #e6e6e6;
    }

    .theme-winter .neon-title,
    .theme-winter .version {
      color: #f0f0f0;
    }

    .theme-winter .subtitle,
    .theme-winter .date {
      color: #a8a8a8;
    }

    .theme-winter .proxy-link {
      background: rgba(18, 18, 18, 0.26);
      color: #f2f2f2;
    }

    .theme-winter .proxy-link:hover {
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }
  </style>
</head>

<script>
// Track badge with visit counter
(function() {
  const page = 'links';
  const visits = parseInt(localStorage.getItem('visit_' + page) || '0') + 1;
  localStorage.setItem('visit_' + page, visits);
  
  const unlocked = JSON.parse(localStorage.getItem('unlockedBadges') || '[]');
  const req = 3;
  if (visits >= req && !unlocked.includes(page)) {
    unlocked.push(page);
    localStorage.setItem('unlockedBadges', JSON.stringify(unlocked));
  }
  localStorage.setItem('lastBadgeChecked', unlocked.length);
})();
</script>
