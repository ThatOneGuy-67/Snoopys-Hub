<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #1a1a1a;
      color: white;
      text-align: center;
    }

    .hidden { display: none; }

    input, button {
      width: 240px;
      padding: 10px;
      margin: 6px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #4da3ff;
      color: white;
    }

    /* Admin Tabs */
    .admin-tabs {
      margin: 20px 0;
    }
    .tab-btn {
      width: auto !important;
      margin: 4px;
      padding: 8px 16px !important;
      background: #333;
      border: 1px solid #555;
    }
    .tab-btn.active {
      background: #4da3ff;
      border-color: #4da3ff;
    }
    .tab-content {
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin: 10px 0;
    }
    .tab-content.hidden {
      display: none;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: 0 auto;
    }
    .stat-card {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
    }
    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #4da3ff;
    }
    .stat-label {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Admin Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">
  <h2>🛠 Admin Panel</h2>
  
  <!-- Tab Navigation -->
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="showTab('polls')">🗳 Polls</button>
    <button class="tab-btn" onclick="showTab('announcements')">📢 Announcements</button>
    <button class="tab-btn" onclick="showTab('analytics')">📊 Analytics</button>
    <button class="tab-btn" onclick="showTab('backup')">💾 Backup</button>
  </div>

  <!-- Polls Tab -->
  <div id="polls" class="tab-content">
    <h3>🗳 Manage Polls</h3>
    
    <div style="margin: 20px 0;">
      <label style="display: block; margin-bottom: 10px;">Select Poll:</label>
      <select id="pollSelector" onchange="loadPoll(this.value)" style="width: 240px; padding: 10px; margin: 6px; border-radius: 8px; border: none;">
        <option value="">-- New Poll --</option>
      </select>
      <button onclick="loadPollList()" style="width: auto; padding: 8px 16px;">🔄 Refresh List</button>
    </div>

    <div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px;">
      <h4>Poll Details</h4>
      <input id="pollName" placeholder="Poll ID (e.g., main, poll2, poll3)" style="background: #333; color: #aaa;" />
      <input id="title" placeholder="Question" />
      <input id="optionA" placeholder="Option A" />
      <input id="optionB" placeholder="Option B" />
      <br>
      <button onclick="createPoll()">💾 Save Poll</button>
      <button onclick="deletePoll()" style="background:#ff4d4d;">🗑 Delete Poll</button>
      <button onclick="resetPoll()" style="background:#ff9500;">🔄 Reset Votes</button>
    </div>
    
    <div id="pollStatus" style="margin-top: 10px; color: #aaa; font-size: 12px;"></div>
  </div>

  <!-- Announcements Tab -->
  <div id="announcements" class="tab-content hidden">
    <h3>📢 Site Announcements</h3>
    <input id="announcementTitle" placeholder="Announcement Title" />
    <textarea id="announcementText" placeholder="Announcement message..." style="width:240px;height:80px;padding:10px;margin:6px;border-radius:8px;border:none;resize:none;"></textarea>
    <br>
    <button onclick="postAnnouncement()">Post Announcement</button>
    <button onclick="clearAnnouncement()" style="background:#ff4d4d;">Clear Announcement</button>
    <p id="announcementStatus"></p>
  </div>

  <!-- Analytics Tab -->
  <div id="analytics" class="tab-content hidden">
    <h3>📊 Site Analytics</h3>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="statUsers">-</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statPollVotes">-</div>
        <div class="stat-label">Total Votes</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statChats">-</div>
        <div class="stat-label">Chat Messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statLastReset">-</div>
        <div class="stat-label">Last Poll Reset</div>
      </div>
    </div>
    <button onclick="loadAnalytics()" style="margin-top:15px;">🔄 Refresh Stats</button>
  </div>

  <!-- Backup Tab -->
  <div id="backup" class="tab-content hidden">
    <h3>💾 Data Export/Backup</h3>
    <p>Export all site data as JSON for backup.</p>
    <button onclick="exportData()">📥 Export All Data</button>
    <button onclick="importData()" style="background:#4da3ff;">📤 Import Data</button>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImport(this)">
    <p id="backupStatus"></p>
  </div>

  <br><br>
  <button onclick="logout()" style="background:#666;">🚪 Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  getDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qokCt--RrebnKxF7qfn5pHW5_R27SkM",
  authDomain: "snoopys-hub.firebaseapp.com",
  projectId: "snoopys-hub",
  storageBucket: "snoopys-hub.appspot.com",
  messagingSenderId: "711107016273",
  appId: "1:711107016273:web:c0680189aa61f6b9052a70"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .catch(err => {
      document.getElementById("status").innerText = err.message;
    });
};

// 🔓 LOGOUT
window.logout = function () {
  signOut(auth);
};

// 👀 AUTH + EMAIL LOCK
onAuthStateChanged(auth, user => {
  if (user) {

    // 🔒 ONLY ALLOW THESE ADMINS
    if (
      user.email !== "carsonldavis11@outlook.com" &&
      user.email !== "carsonldavis@halifax.k12.va.us"
    ) {
      alert("Not authorized");
      signOut(auth);
      return;
    }

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    
    // Load poll list when admin logs in
    loadPollList();

  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
  }
});

// 🗳 LOAD POLL LIST
window.loadPollList = async function () {
  try {
    const selector = document.getElementById("pollSelector");
    const pollsRef = doc(db, "polls");
    
    // For this demo, we'll query known polls
    // In production, you'd query a collection
    const knownPollIds = ["main", "poll2", "poll3", "poll4", "poll5"];
    
    selector.innerHTML = '<option value="">-- New Poll --</option>';
    
    for (const pollId of knownPollIds) {
      try {
        const pollSnap = await getDoc(doc(db, "polls", pollId));
        if (pollSnap.exists()) {
          const option = document.createElement("option");
          option.value = pollId;
          option.textContent = `${pollId} (${pollSnap.data().title || 'Untitled'})`;
          selector.appendChild(option);
        }
      } catch (e) {
        // Skip if poll doesn't exist
      }
    }
    
    document.getElementById("pollStatus").innerText = "✅ Poll list loaded";
  } catch (err) {
    console.error("Load poll list error:", err);
    document.getElementById("pollStatus").innerText = "❌ Error loading polls";
  }
};

// 📖 LOAD SPECIFIC POLL
window.loadPoll = async function(pollId) {
  if (!pollId) {
    // Clear form for new poll
    document.getElementById("pollName").value = "";
    document.getElementById("title").value = "";
    document.getElementById("optionA").value = "";
    document.getElementById("optionB").value = "";
    document.getElementById("pollStatus").innerText = "Creating new poll...";
    return;
  }
  
  try {
    const pollSnap = await getDoc(doc(db, "polls", pollId));
    
    if (pollSnap.exists()) {
      const data = pollSnap.data();
      document.getElementById("pollName").value = pollId;
      document.getElementById("pollName").style.background = "#555";
      document.getElementById("pollName").style.color = "#ccc";
      document.getElementById("pollName").disabled = true;
      document.getElementById("title").value = data.title || "";
      document.getElementById("optionA").value = data.A_label || "";
      document.getElementById("optionB").value = data.B_label || "";
      
      const totalVotes = (data.A || 0) + (data.B || 0);
      document.getElementById("pollStatus").innerText = `📊 Votes: A=${data.A || 0}, B=${data.B || 0} (Total: ${totalVotes})`;
    } else {
      alert("Poll not found");
      document.getElementById("pollSelector").value = "";
    }
  } catch (err) {
    console.error("Load poll error:", err);
    alert("Error loading poll");
  }
};

// 🗳 CREATE/UPDATE POLL
window.createPoll = async function () {
  const pollName = document.getElementById("pollName").value.trim();
  const title = document.getElementById("title").value.trim();
  const a = document.getElementById("optionA").value.trim();
  const b = document.getElementById("optionB").value.trim();

  if (!pollName || !title || !a || !b) {
    alert("Please fill in all fields");
    return;
  }

  try {
    await setDoc(doc(db, "polls", pollName), {
      title: title,
      A_label: a,
      B_label: b,
      A: 0,
      B: 0
    }, { merge: true });

    document.getElementById("pollStatus").innerText = `✅ Poll '${pollName}' saved!`;
    
    // Reload poll list
    setTimeout(() => {
      loadPollList();
    }, 500);
  } catch (err) {
    console.error("Create poll error:", err);
    document.getElementById("pollStatus").innerText = "❌ Failed to create poll";
  }
};

// 🗑 DELETE POLL
window.deletePoll = async function () {
  const pollName = document.getElementById("pollName").value.trim();
  
  if (!pollName) {
    alert("No poll selected");
    return;
  }
  
  const confirmDelete = confirm(`Delete poll '${pollName}'? This cannot be undone.`);
  if (!confirmDelete) return;

  try {
    await deleteDoc(doc(db, "polls", pollName));
    
    document.getElementById("pollStatus").innerText = `✅ Poll '${pollName}' deleted!`;
    document.getElementById("pollName").value = "";
    document.getElementById("title").value = "";
    document.getElementById("optionA").value = "";
    document.getElementById("optionB").value = "";
    document.getElementById("pollName").disabled = false;
    document.getElementById("pollName").style.background = "";
    document.getElementById("pollName").style.color = "";
    document.getElementById("pollSelector").value = "";
    
    setTimeout(() => {
      loadPollList();
    }, 500);
  } catch (err) {
    console.error("Delete poll error:", err);
    document.getElementById("pollStatus").innerText = "❌ Failed to delete poll";
  }
};

// 🔄 RESET POLL
window.resetPoll = async function () {
  const pollName = document.getElementById("pollName").value.trim();
  
  if (!pollName) {
    alert("No poll selected");
    return;
  }
  
  const confirmReset = confirm(`Reset all votes for poll '${pollName}'?`);
  if (!confirmReset) return;

  try {
    await updateDoc(doc(db, "polls", pollName), {
      A: 0,
      B: 0,
      lastReset: Date.now()
    });

    document.getElementById("pollStatus").innerText = `✅ Poll '${pollName}' votes reset!`;
    
    setTimeout(() => {
      loadPoll(pollName);
    }, 500);
  } catch (err) {
    console.error("Reset failed:", err);
    document.getElementById("pollStatus").innerText = "❌ Reset failed";
  }
};

// 📑 TAB NAVIGATION
window.showTab = function(tabId) {
  // Hide all tab contents
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  // Show selected tab
  document.getElementById(tabId).classList.remove('hidden');
  
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  // Load analytics if that tab
  if (tabId === 'analytics') loadAnalytics();
};

// 📢 ANNOUNCEMENTS

window.postAnnouncement = async function() {
  const title = document.getElementById("announcementTitle").value.trim();
  const text = document.getElementById("announcementText").value.trim();
  
  if (!title || !text) {
    document.getElementById("announcementStatus").innerText = "Please fill in all fields";
    return;
  }
  
  document.getElementById("announcementStatus").innerText = "⏳ Posting...";
  
  try {
    console.log("Posting announcement:", { title, text });
    await setDoc(doc(db, "site", "announcement"), {
      title: title,
      text: text,
      postedAt: Date.now()
    }, { merge: true });
    
    console.log("Announcement posted successfully!");
    document.getElementById("announcementStatus").innerText = "✅ Announcement posted!";
    document.getElementById("announcementTitle").value = "";
    document.getElementById("announcementText").value = "";
  } catch (err) {
    console.error("Announcement error:", err);
    document.getElementById("announcementStatus").innerText = "❌ Failed: " + err.message;
  }
};

window.clearAnnouncement = async function() {
  if (!confirm("Clear the current announcement?")) return;
  
  try {
    // Use deleteDoc instead of setting null values
    const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
    await deleteDoc(doc(db, "site", "announcement"));
    
    document.getElementById("announcementStatus").innerText = "✅ Announcement cleared";
  } catch (err) {
    // If delete fails, try setting empty values
    try {
      await setDoc(doc(db, "site", "announcement"), {
        title: "",
        text: "",
        postedAt: 0
      }, { merge: true });
      document.getElementById("announcementStatus").innerText = "✅ Announcement cleared";
    } catch (err2) {
      document.getElementById("announcementStatus").innerText = "❌ Failed: " + err2.message;
    }
  }
};

// 📊 ANALYTICS
window.loadAnalytics = async function() {
  try {
    // Get poll data
    const pollSnap = await getDoc(doc(db, "polls", "main"));
    if (pollSnap.exists()) {
      const pollData = pollSnap.data();
      const totalVotes = (pollData.A || 0) + (pollData.B || 0);
      document.getElementById("statPollVotes").innerText = totalVotes;
      
      if (pollData.lastReset) {
        const date = new Date(pollData.lastReset);
        document.getElementById("statLastReset").innerText = date.toLocaleDateString();
      } else {
        document.getElementById("statLastReset").innerText = "Never";
      }
    } else {
      document.getElementById("statPollVotes").innerText = "0";
      document.getElementById("statLastReset").innerText = "N/A";
    }
    
    // Chat and Users - not available (external chat)
    document.getElementById("statChats").innerText = "N/A";
    document.getElementById("statUsers").innerText = "N/A";
    
  } catch (err) {
    console.error("Analytics error:", err);
    document.getElementById("statPollVotes").innerText = "Error";
    document.getElementById("statLastReset").innerText = "Error";
  }
};

// 💾 DATA EXPORT
window.exportData = async function() {
  try {
    const data = {};
    
    // Export poll
    const pollSnap = await getDoc(doc(db, "polls", "main"));
    if (pollSnap.exists()) data.poll = pollSnap.data();
    
    // Export announcement
    const annSnap = await getDoc(doc(db, "site", "announcement"));
    if (annSnap.exists()) data.announcement = annSnap.data();
    
    // Create and download JSON file
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `snoopys-hub-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    
    document.getElementById("backupStatus").innerText = "✅ Data exported!";
  } catch (err) {
    console.error(err);
    document.getElementById("backupStatus").innerText = "❌ Export failed";
  }
};

window.importData = function() {
  document.getElementById("importFile").click();
};

window.handleImport = async function(input) {
  const file = input.files[0];
  if (!file) return;
  
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    
    if (data.poll) {
      await setDoc(doc(db, "polls", "main"), data.poll, { merge: true });
    }
    if (data.announcement) {
      await setDoc(doc(db, "site", "announcement"), data.announcement, { merge: true });
    }
    
    document.getElementById("backupStatus").innerText = "✅ Data imported!";
    input.value = ""; // Reset file input
  } catch (err) {
    console.error(err);
    document.getElementById("backupStatus").innerText = "❌ Import failed - invalid file";
  }
};
</script>
