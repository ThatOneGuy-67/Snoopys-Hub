<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #1a1a1a;
      color: white;
      text-align: center;
    }

    .hidden { display: none; }

    input, button {
      width: 240px;
      padding: 10px;
      margin: 6px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #4da3ff;
      color: white;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Admin Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">
  <h2>🛠 Create Poll</h2>

  <input id="title" placeholder="Question" />
  <input id="optionA" placeholder="Option A" />
  <input id="optionB" placeholder="Option B" />

  <button onclick="createPoll()">Create Poll</button>
  <button onclick="resetPoll()" style="background:#ff4d4d;">Reset Poll Votes</button>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2qokCt--RrebnKxF7qfn5pHW5_R27SkM",
  authDomain: "snoopys-hub.firebaseapp.com",
  projectId: "snoopys-hub",
  storageBucket: "snoopys-hub.appspot.com",
  messagingSenderId: "711107016273",
  appId: "1:711107016273:web:c0680189aa61f6b9052a70"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .catch(err => {
      document.getElementById("status").innerText = err.message;
    });
};

// 🔓 LOGOUT
window.logout = function () {
  signOut(auth);
};

// 👀 AUTH + EMAIL LOCK
onAuthStateChanged(auth, user => {
  if (user) {

    // 🔒 ONLY ALLOW THESE ADMINS
    if (
      user.email !== "carsonldavis11@outlook.com" &&
      user.email !== "carsonldavis@halifax.k12.va.us"
    ) {
      alert("Not authorized");
      signOut(auth);
      return;
    }

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");

  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
  }
});

// 🗳 CREATE POLL
window.createPoll = async function () {
  const title = document.getElementById("title").value;
  const a = document.getElementById("optionA").value;
  const b = document.getElementById("optionB").value;

  if (!title || !a || !b) {
    alert("Please fill in all fields");
    return;
  }

  try {
    // Update the main poll with new values
    await setDoc(doc(db, "polls", "main"), {
      title: title,
      A_label: a,
      B_label: b,
      A: 0,
      B: 0
    }, { merge: true });

    alert("Poll Created!");
    
    // Clear localStorage so users can vote again
    localStorage.removeItem("voted_main");
  } catch (err) {
    console.error("Create poll error:", err);
    alert("Failed to create poll");
  }
};

// 🔄 RESET POLL
window.resetPoll = async function () {
  const confirmReset = confirm("Reset all votes?");

  if (!confirmReset) return;

  try {
    const pollRef = doc(db, "polls", "main");

    await updateDoc(pollRef, {
      A: 0,
      B: 0
    });

    alert("Poll reset successfully!");
  } catch (err) {
    console.error("Reset failed:", err);
    alert("Reset failed — check console");
  }
};
</script>

</body>
</html>
