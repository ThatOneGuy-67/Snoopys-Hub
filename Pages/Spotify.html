<script>
// Track badge with visit counter and notifications
(function() {
  const page = 'music';
  const visits = parseInt(localStorage.getItem('visit_' + page) || '0') + 1;
  localStorage.setItem('visit_' + page, visits);
  
  const unlocked = JSON.parse(localStorage.getItem('unlockedBadges') || '[]');
  const req = 7;
  if (visits >= req && !unlocked.includes(page)) {
    unlocked.push(page);
    localStorage.setItem('unlockedBadges', JSON.stringify(unlocked));
    const title = '🏆 Achievement Unlocked!';
    const body = 'You unlocked "Music Lover"!';
    if (window.parent && window.parent.triggerNotification) {
      window.parent.triggerNotification(title, body);
    }
    if (window.showSiteNotification) {
      window.showSiteNotification(title, body);
    }
    localStorage.setItem('badgeNotification', JSON.stringify({ title, body, time: Date.now() }));
  }
  localStorage.setItem('lastBadgeChecked', unlocked.length);
})();
</script>
