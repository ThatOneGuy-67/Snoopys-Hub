        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            onSnapshot,
            increment
            } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

            console.log("POLL SCRIPT LOADED");

            // =====================
            // 🔥 FIREBASE SETUP
            // =====================
            const firebaseConfig = {
            apiKey: "AIzaSyA2qokCt--RrebnKxF7qfn5pHW5_R27SkM",
            authDomain: "snoopys-hub.firebaseapp.com",
            projectId: "snoopys-hub",
            storageBucket: "snoopys-hub.appspot.com",
            messagingSenderId: "711107016273",
            appId: "1:711107016273:web:c0680189aa61f6b9052a70"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // =====================
            // 🗳 POLL STATE
            // =====================
            const pollRef = doc(db, "polls", "main");

            let pollReady = false;
            let hasVoted = false;

            // =====================
            // 🔥 INIT POLL (CREATE IF NONE)
            // =====================
            async function initPoll() {
            try {
                const snap = await getDoc(pollRef);

                if (!snap.exists()) {
                await setDoc(pollRef, {
                    title: "What do you want?",
                    A_label: "More Movies/TV Shows",
                    B_label: "More Music",
                    A: 0,
                    B: 0
                });
                }

                pollReady = true;
                console.log("Poll initialized");

                listenPoll();

                // Check if poll was reset since we last voted
                const data = snap.data();
                const storedVote = localStorage.getItem("voted_main");
                const storedReset = localStorage.getItem("pollResetTime");
                
                if (storedVote && data?.lastReset) {
                    // If poll was reset after we voted, clear the vote
                    if (data.lastReset > storedReset) {
                        localStorage.removeItem("voted_main");
                        localStorage.removeItem("pollResetTime");
                    } else {
                        hasVoted = true;
                        showResultsOnly();
                    }
                } else if (storedVote) {
                    hasVoted = true;
                    showResultsOnly();
                }

            } catch (err) {
                console.error("Init error:", err);
                document.getElementById("question").innerText = "Poll unavailable";
            }
            }

            // =====================
            // 🗳 VOTE FUNCTION
            // =====================
            window.vote = async function(option) {
                console.log("Vote called:", option);
                if (!pollReady) {
                    alert("Poll still loading...");
                    return;
                }

                if (hasVoted) {
                    console.log("Already voted");
                    return;
                }

                try {
                    // Get current poll data first
                    const snap = await getDoc(pollRef);
                    const data = snap.data();
                    console.log("Current poll data:", data);
                    
                    if (!data) {
                        alert("Poll not found. Please refresh.");
                        return;
                    }
                    
                    const currentVal = data[option] || 0;
                    
                    // Update with incremented value using setDoc for more reliability
                    await setDoc(pollRef, {
                        [option]: currentVal + 1
                    }, { merge: true });

                    // Store vote and the reset time to check against later
                    localStorage.setItem("voted_main", option);
                    localStorage.setItem("pollResetTime", data.lastReset || 0);
                    hasVoted = true;

                    showResultsOnly();
                    console.log("Vote recorded successfully");

                } catch (err) {
                    console.error("Vote error:", err);
                    alert("Failed to vote: " + err.message);
                }
            };

            // =====================
            // 📊 LIVE POLL UPDATES
            // =====================
            function listenPoll() {
            onSnapshot(pollRef, (snap) => {
                const data = snap.data();
                if (!data) return;

                // Update question and labels
                if (data.title) {
                    document.getElementById("question").innerText = data.title;
                }
                
                // Update button labels if they exist
                const btnA = document.querySelector('#voteButtons button:first-child');
                const btnB = document.querySelector('#voteButtons button:last-child');
                if (btnA && data.A_label) btnA.innerText = data.A_label;
                if (btnB && data.B_label) btnB.innerText = data.B_label;

                const total = data.A + data.B;

                const a = total ? (data.A / total) * 100 : 0;
                const b = total ? (data.B / total) * 100 : 0;

                const barA = document.getElementById("barA");
                const barB = document.getElementById("barB");

                if (barA) barA.style.width = a + "%";
                if (barB) barB.style.width = b + "%";

                const textA = document.getElementById("textA");
                const textB = document.getElementById("textB");

                if (textA) textA.innerText = `More Movies: ${data.A} (${a.toFixed(1)}%)`;
                if (textB) textB.innerText = `More Music: ${data.B} (${b.toFixed(1)}%)`;
            });
            }

            // =====================
            // 🎯 UI CONTROL
            // =====================
            function showResultsOnly() {
            const buttons = document.getElementById("voteButtons");
            const results = document.getElementById("results");
            const closeBtn = document.getElementById("closeBtn");

            if (buttons) buttons.style.display = "none";
            if (results) results.classList.remove("hidden");
            if (closeBtn) closeBtn.classList.remove("hidden");
            }

            // =====================
            // ❌ CLOSE OVERLAY
            // =====================
            window.closePoll = function () {
            const overlay = document.getElementById("overlay");
            if (overlay) overlay.style.display = "none";
            };

            // =====================
            // 🚀 START
            // =====================
            initPoll();

            // Attach click listeners directly for better reliability
            setTimeout(() => {
                const btnA = document.getElementById('btnA');
                const btnB = document.getElementById('btnB');
                const closeBtn = document.getElementById('closeBtn');
                
                if (btnA) {
                    btnA.addEventListener('click', () => window.vote('A'));
                    console.log("Button A attached");
                }
                if (btnB) {
                    btnB.addEventListener('click', () => window.vote('B'));
                    console.log("Button B attached");
                }
                if (closeBtn) {
                    closeBtn.addEventListener('click', () => window.closePoll());
                    console.log("Close button attached");
                }
            }, 100);

        </script>
        <!-- END POLL Code -->

        <script>
        /* DATE & TIME */
        function updateTime() {
        const now = new Date();
        document.getElementById("date").innerText =
            now.toLocaleDateString(undefined, {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
            });
        document.getElementById("time").innerText =
            now.toLocaleTimeString();
        }
        updateTime();
        setInterval(updateTime, 1000);

        /* BATTERY */
        if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            function updateBattery() {
            const percent = Math.round(battery.level * 100);
            document.getElementById("battery-fill").style.width = percent + "%";
            document.getElementById("battery-status").innerText =
                percent + "% • " + (battery.charging ? "Charging" : "Discharging");
            }
            updateBattery();
            battery.addEventListener("levelchange", updateBattery);
            battery.addEventListener("chargingchange", updateBattery);
        });
        } else {
        document.getElementById("battery-status").innerText =
            "Battery not supported";
        }

        function getIcon(code) {
            if (code === 0) return "☀️";
            if (code <= 3) return "🌤️";
            if (code <= 48) return "☁️";
            if (code <= 67) return "🌧️";
            if (code <= 82) return "🌦️";
            return "⛈️";
        }

        function loadWeather() {

            const saved = localStorage.getItem("coords");

            if (saved) {
                const { lat, lon } = JSON.parse(saved);
                fetchWeather(lat, lon);
                return;
            }

            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                localStorage.setItem("coords", JSON.stringify({ lat, lon }));

                fetchWeather(lat, lon);
            }, () => {
                document.getElementById("weather-desc").innerText = "Location blocked";
            });
        }

        function fetchWeather(lat, lon) {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit&wind_speed_unit=mph`)
            .then(res => res.json())
            .then(data => {
                const w = data.current_weather;

                document.getElementById("weather-icon").innerText = getIcon(w.weathercode);
                document.getElementById("weather-temp").innerText = Math.round(w.temperature) + "°F";
                document.getElementById("weather-wind").innerText = Math.round(w.windspeed);
            });
        }

        loadWeather();

        /* FOOTER BUTTONS — EDIT THESE */
        const footerButtons = [
            { text: "Home", link: "index.html" },
            { text: "Links", link: "Pages/Links.html" },
            { text: "Chat", link: "Pages/Chat.html" },
            { text: "Games", link: "Pages/Games.html" },
            { text: "Movies", link: "Pages/Movies.html" },
            { text: "Tools", link: "Pages/Tools.html" },
            { text: "Updates", link: "Pages/Updates.html" },
            { text: "OS", link: "Pages/OS.html" }
        ];

           window.onload = () => {
                const footer = document.getElementById("footer-buttons");
            
                if (!footer) return;
            
                footerButtons.forEach(btn => {
                    const a = document.createElement("a");
                    a.href = btn.link;
                    a.textContent = btn.text;
                    
                    a.rel = "noopener noreferrer";
            
                    footer.appendChild(a);
                });
            };
        </script>
