            #barB { height: 100%; width: 0%; background: #2196F3; }

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            onSnapshot,
            increment
            } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

            const firebaseConfig = {
            apiKey: "AIzaSyA2qokCt--RrebnKxF7qfn5pHW5_R27SkM",
            authDomain: "snoopys-hub.firebaseapp.com",
            projectId: "snoopys-hub",
            storageBucket: "snoopys-hub.appspot.com",
            messagingSenderId: "711107016273",
            appId: "1:711107016273:web:c0680189aa61f6b9052a70"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            let currentPollId = null;
            let hasVoted = false;

            /* LOAD POLL */
            async function loadPoll() {
            const snap = await getDoc(doc(db, "polls", "poll_1"));
            if (!snap.exists()) return;

            const data = snap.data();
            currentPollId = "poll_1";

            document.getElementById("question").innerText = data.title;

            listen();
            }

            /* LIVE UPDATES */
            function listen() {
            onSnapshot(doc(db, "polls", currentPollId), (snap) => {
                const data = snap.data();
                const total = data.A + data.B;

                const a = total ? (data.A / total) * 100 : 0;
                const b = total ? (data.B / total) * 100 : 0;

                document.getElementById("barA").style.width = a + "%";
                document.getElementById("barB").style.width = b + "%";

                document.getElementById("textA").innerText =
                `Option A: ${a.toFixed(1)}% (${data.A})`;

                document.getElementById("textB").innerText =
                `Option B: ${b.toFixed(1)}% (${data.B})`;
            });
            }

            /* ✅ FIXED VOTE FUNCTION (GLOBAL) */
            window.vote = async function(option) {
            console.log("clicked:", option);

            if (hasVoted) return;

            const ref = doc(db, "polls", currentPollId);

            await updateDoc(ref, {
                [option]: increment(1)
            });

            hasVoted = true;

            document.getElementById("voteButtons").classList.add("hidden");
            document.getElementById("results").classList.remove("hidden");
            document.getElementById("closeBtn").classList.remove("hidden");
            };

            /* CLOSE */
            window.closePoll = function () {
            if (!hasVoted) return;
            document.getElementById("overlay").style.display = "none";
            };

            /* START */
            window.addEventListener("load", loadPoll);
        </script>
        <!-- END POLL Code -->

        <script>
        /* DATE & TIME */
        function updateTime() {
        const now = new Date();
        document.getElementById("date").innerText =
            now.toLocaleDateString(undefined, {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
            });
        document.getElementById("time").innerText =
            now.toLocaleTimeString();
        }
        updateTime();
        setInterval(updateTime, 1000);

        /* BATTERY */
        if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            function updateBattery() {
            const percent = Math.round(battery.level * 100);
            document.getElementById("battery-fill").style.width = percent + "%";
            document.getElementById("battery-status").innerText =
                percent + "% • " + (battery.charging ? "Charging" : "Discharging");
            }
            updateBattery();
            battery.addEventListener("levelchange", updateBattery);
            battery.addEventListener("chargingchange", updateBattery);
        });
        } else {
        document.getElementById("battery-status").innerText =
            "Battery not supported";
        }

        function getIcon(code) {
            if (code === 0) return "☀️";
            if (code <= 3) return "🌤️";
            if (code <= 48) return "☁️";
            if (code <= 67) return "🌧️";
            if (code <= 82) return "🌦️";
            return "⛈️";
        }

        function loadWeather() {

            const saved = localStorage.getItem("coords");

            if (saved) {
                const { lat, lon } = JSON.parse(saved);
                fetchWeather(lat, lon);
                return;
            }

            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                localStorage.setItem("coords", JSON.stringify({ lat, lon }));

                fetchWeather(lat, lon);
            }, () => {
                document.getElementById("weather-desc").innerText = "Location blocked";
            });
        }

        function fetchWeather(lat, lon) {
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit&wind_speed_unit=mph`)
            .then(res => res.json())
            .then(data => {
                const w = data.current_weather;

                document.getElementById("weather-icon").innerText = getIcon(w.weathercode);
                document.getElementById("weather-temp").innerText = Math.round(w.temperature) + "°F";
                document.getElementById("weather-wind").innerText = Math.round(w.windspeed);
            });
        }

        loadWeather();

        /* FOOTER BUTTONS — EDIT THESE */
        const footerButtons = [
            { text: "Home", link: "index.html" },
            { text: "Links", link: "Pages/Proxys.html" },
            { text: "Chat", link: "Pages/Chat.html" },
            { text: "Games", link: "Pages/Games.html" },
            { text: "Tools", link: "Pages/Tools.html" },
            { text: "Updates", link: "Pages/Updates.html" },
            { text: "OS", link: "Pages/OS.html" }
        ];

           window.onload = () => {
                const footer = document.getElementById("footer-buttons");
            
                if (!footer) return;
            
                footerButtons.forEach(btn => {
                    const a = document.createElement("a");
                    a.href = btn.link;
                    a.textContent = btn.text;
                    a.target = "_blank";
                    a.rel = "noopener noreferrer";
            
                    footer.appendChild(a);
                });
            };
